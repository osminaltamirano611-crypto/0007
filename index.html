        function decode(encoded, key) {
            let binary = atob(encoded);
            let result = "";
            for (let i = 0; i < binary.length; i++) {
                result += String.fromCharCode(binary.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        }

        try {
            let html = decode(encoded, key);

            let iframe = document.createElement("iframe");
            iframe.style.width = "100%";
            iframe.style.height = "100vh";
            iframe.style.border = "none";
            document.body.appendChild(iframe);

            iframe.contentWindow.document.open();
            iframe.contentWindow.document.write(html);
            iframe.contentWindow.document.close();

        } catch(e) {
            document.body.innerHTML = "<h2>Error al cargar contenido</h2>";
